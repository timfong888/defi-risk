name: Sync feed data

on:
  schedule:
    - cron: "20 4 * * *" # nightly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/sync-defiscan.mjs
      - run: node scripts/snapshot-metrics.mjs
      - run: node scripts/validate-data.mjs
      - name: Open PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: |
            data/synced/
            data/metrics-snapshot.json
          branch: sync/feed-data
          branch-suffix: timestamp
          commit-message: "data: nightly feed sync"
          title: "Nightly feed data sync"
          body: >
            Automated sync from provider sources. Review the diff: every
            change to a verbatim assessment should trace to an upstream
            provider change. Sync scripts fail on upstream schema drift and
            on entry-count regression, so a green run means shape-stable
            data; the diff review is about content.
